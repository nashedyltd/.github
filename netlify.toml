[build]
  command = "zola build"
  publish = "public"

[build.environment]
  ZOLA_VERSION = "0.18.0"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
  
[context.production.environment]
  ZOLA_VERSION = "0.18.0"
